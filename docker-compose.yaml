services:
  base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: userver-base

  postgres:
    image: postgres:16
    container_name: social-network-postgres
    environment:
      POSTGRES_DB: social_network
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_network"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth:
    build:
      context: ./auth-service
    depends_on:
      - base
    ports:
      - "8081:8081"

  users:
    build:
      context: ./user-service
    depends_on:
      postgres:
        condition: service_healthy
      base:
        condition: service_started
    ports:
      - "8082:8082"

  wall:
    build:
      context: ./wall-service
    depends_on:
      postgres:
        condition: service_healthy
      base:
        condition: service_started
    ports:
      - "8083:8083"

  chat:
    build:
      context: ./chat-service
    depends_on:
      postgres:
        condition: service_healthy
      base:
        condition: service_started
    ports:
      - "8084:8084"

  mongo:
    image: mongo:7
    container_name: social-network-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: social_network_mongo
    volumes:
      - ./mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: social-network-redis
    ports:
      - "6380:6379"

  mongo_api:
    build:
      context: ./mongo-api
    container_name: social-network-mongo-api
    depends_on:
      - mongo
      - redis
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: social_network_mongo
      REDIS_URL: redis://redis:6379

  rabbitmq:
    image: rabbitmq:3-management
    container_name: social-network-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  event_consumer:
    build:
      context: ./event-service
    container_name: social-network-event-consumer
    depends_on:
      - rabbitmq
      - mongo
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: social_network_mongo
    command: python consumer.py

  event_producer:
    build:
      context: ./event-service
    container_name: social-network-event-producer
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    command: python producer.py

volumes:
  mongo_data: